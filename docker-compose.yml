version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: email_classifier_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-email_classifier}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - email_classifier_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: email_classifier_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - email_classifier_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: email_classifier_api
    environment:
      - MONGODB_URL=mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme123}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-email_classifier}
      - REDIS_URL=redis://redis:6379/0
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_CREDENTIALS_PATH=${GCP_CREDENTIALS_PATH:-/app/credentials/service-account-key.json}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./credentials:/app/credentials:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - email_classifier_network
    restart: unless-stopped
    command: >
      sh -c "pip install -r requirements.txt && 
             python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  # Adminer for MongoDB Management (Optional)
  adminer:
    image: adminer:latest
    container_name: email_classifier_adminer
    ports:
      - "8080:8080"
    networks:
      - email_classifier_network
    depends_on:
      - mongodb
    restart: unless-stopped

networks:
  email_classifier_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

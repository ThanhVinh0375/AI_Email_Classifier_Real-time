version: '3.8'

services:
# MongoDB Database with Production Optimizations
  mongodb:
    image: mongo:7.0
    container_name: email_classifier_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-email_classifier}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_logs:/var/log/mongodb
    networks:
      - email_classifier_network
    
    # MongoDB startup command with performance tuning
    command: mongod --wiredTigerCacheSizeGB 2
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    restart: unless-stopped
    
    # Resource Limits for Container
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    # Logging Configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Redis Cache Layer
  redis:
    image: redis:7-alpine
    container_name: email_classifier_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - email_classifier_network
    
    # Redis Configuration
    command: redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --timeout 300
      --tcp-keepalive 60
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: email_classifier_api
    
    environment:
      # MongoDB Configuration with Connection Pooling
      - MONGODB_URL=mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme123}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-email_classifier}
      - MONGODB_MAX_POOL_SIZE=50
      - MONGODB_MIN_POOL_SIZE=10
      - MONGODB_SERVER_SELECTION_TIMEOUT_MS=5000
      - MONGODB_SOCKET_TIMEOUT_MS=30000
      - MONGODB_CONNECT_TIMEOUT_MS=10000
      - MONGODB_MAX_IDLE_TIME_MS=45000
      - MONGODB_RETRY_WRITES=true
      - MONGODB_RETRY_READS=true
      
      # Redis Configuration
      - REDIS_URL=redis://redis:6379/0
      
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_ENV=${API_ENV:-production}
      - API_WORKERS=${API_WORKERS:-4}
      
      # Google Cloud Configuration
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_CREDENTIALS_PATH=${GCP_CREDENTIALS_PATH:-/app/credentials/service-account-key.json}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # AI Model Configuration
      - LLM_API_PROVIDER=${LLM_API_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - ENABLE_SPAM_DETECTION=true
      - ENABLE_LLM_ANALYSIS=true
      - SKIP_LLM_FOR_SPAM=true
    
    ports:
      - "8000:8000"
    
    volumes:
      - .:/app
      - ./credentials:/app/credentials:ro
    
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - email_classifier_network
    
    restart: unless-stopped
    
    # Health Check for FastAPI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/stats"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    # Logging Configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    command: sh -c "pip install -r requirements.txt && python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http httptools"

  # MongoDB Admin UI (Optional - for development)
  mongodb-express:
    image: mongo-express:latest
    container_name: email_classifier_mongodb_express
    environment:
      ME_CONFIG_MONGODB_ADMIN_USERNAME: ${MONGODB_USER:-admin}
      ME_CONFIG_MONGODB_ADMIN_PASSWORD: ${MONGODB_PASSWORD:-changeme123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${ADMIN_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - email_classifier_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # Redis Admin UI (Optional - for development)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: email_classifier_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - email_classifier_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

# Named Volumes for Persistence
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  mongodb_logs:
    driver: local
  redis_data:
    driver: local

# Custom Network
networks:
  email_classifier_network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
